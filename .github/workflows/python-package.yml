name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: pytest -q

  package:
    name: Package validation
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke test wheel install
        run: |
          python -m venv "$RUNNER_TEMP/wheel-venv"
          . "$RUNNER_TEMP/wheel-venv/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import myonlinestore
          print(myonlinestore.__version__)
          print(myonlinestore.ConnectClient)
          PY

      - name: Smoke test sdist install
        run: |
          python -m venv "$RUNNER_TEMP/sdist-venv"
          . "$RUNNER_TEMP/sdist-venv/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz
          python - <<'PY'
          import myonlinestore
          print(myonlinestore.__version__)
          print(myonlinestore.ConnectClient)
          PY
